name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:     # Allows manual triggering
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create output branch if it doesn't exist, checkout if it does
          git fetch origin output 2>/dev/null || git checkout --orphan output
          git checkout output 2>/dev/null || true
          
          # Copy generated SVG files
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg
          
          # Commit and push
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "🐍 Update snake animation" || echo "No changes to commit"
          git push -u origin output
